<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zain Notify Service — Dashboard</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262b36;
    --text: #e6e8eb;
    --muted: #8b93a3;
    --accent: #4f8cff;
    --ok: #3ecf8e;
    --warn: #ffb454;
    --danger: #ff5c5c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .status { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }
  main { padding: 24px 28px; max-width: 980px; margin: 0 auto; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 18px; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  button:hover { opacity: 0.9; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  th { color: var(--muted); font-weight: 500; }
  tr:hover { background: var(--panel); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge.ok { background: rgba(62,207,142,0.15); color: var(--ok); }
  .badge.warn { background: rgba(255,180,84,0.15); color: var(--warn); }
  pre {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    max-width: 400px;
  }
  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<header>
  <h1>🔔 Zain Notify Service</h1>
  <div class="status"><span class="dot"></span> live — port 7666</div>
</header>
<main>
  <div class="toolbar">
    <button onclick="loadEvents()">Refresh</button>
    <button class="secondary" onclick="testTelegram()">Send test Telegram notification</button>
  </div>
  <div id="content">
    <div class="empty">Loading events...</div>
  </div>
</main>

<script>
async function loadEvents() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty">Loading...</div>';
  try {
    const res = await fetch('api/events?limit=100');
    const events = await res.json();
    if (!events.length) {
      content.innerHTML = '<div class="empty">No events received yet. Waiting for calls from Zain server...</div>';
      return;
    }
    let html = '<table><thead><tr><th>ID</th><th>Time</th><th>IP</th><th>Path</th><th>Telegram</th><th>Body</th></tr></thead><tbody>';
    for (const e of events) {
      html += `<tr>
        <td>${e.id}</td>
        <td>${e.created_at}</td>
        <td>${e.source_ip || '-'}</td>
        <td>${e.method} ${e.path}</td>
        <td>${e.telegram_sent ? '<span class="badge ok">sent</span>' : '<span class="badge warn">not sent</span>'}</td>
        <td><pre>${escapeHtml(e.body || '')}</pre></td>
      </tr>`;
    }
    html += '</tbody></table>';
    content.innerHTML = html;
  } catch (err) {
    content.innerHTML = '<div class="empty">Failed to load events: ' + err.message + '</div>';
  }
}

async function testTelegram() {
  const res = await fetch('api/test-telegram', { method: 'POST' });
  const data = await res.json();
  alert(data.sent ? 'Test notification sent to Telegram!' : 'Failed — check TELEGRAM_BOT_TOKEN / CHAT_ID in .env');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

loadEvents();
setInterval(loadEvents, 10000);
</script>
</body>
</html>
